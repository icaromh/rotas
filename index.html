<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Otimizador de Quadrantes GPS</title>
</head>

<body class="bg-gray-50 text-gray-900 font-sans antialiased overflow-hidden">
  <div id="app" class="flex flex-col h-screen w-screen">
    <!-- Top Navigation -->
    <nav
      class="h-16 bg-[#f4f1ea] border-b border-[#e5e0d4] flex items-center justify-between px-6 z-[1000] shrink-0 shadow-sm relative">
      <div class="flex items-center gap-6">
        <div class="flex items-center gap-2">
          <svg class="w-8 h-8 text-[#4a6b46]" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2.5l-9.5 17.5h19L12 2.5zm0 4.2l6.2 11.3h-12.4L12 6.7z" />
          </svg>
          <span class="text-2xl font-extrabold text-gray-800 tracking-tight">rotas</span>
        </div>
        <div class="hidden md:flex gap-5 text-sm font-bold text-gray-700 mt-1">
          <a href="#" class="hover:text-[#4a6b46] transition-colors">Routes</a>
          <a href="#" class="hover:text-[#4a6b46] transition-colors">Planner</a>
          <a href="#" class="hover:text-[#4a6b46] transition-colors">Features</a>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <button
          class="bg-[#f0ece1] text-[#4a6b46] font-bold px-4 py-2 rounded-full text-sm hover:bg-[#e5decb] transition-colors flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
            <line x1="12" y1="18" x2="12.01" y2="18"></line>
          </svg>
          App
        </button>
        <button
          class="bg-[#4a6b46] hover:bg-[#395336] text-white font-bold px-5 py-2 rounded-full text-sm transition-colors shadow-sm">
          Login or Signup
        </button>
      </div>
    </nav>

    <!-- Main Map Area -->
    <div class="flex-1 relative w-full h-full bg-gray-200 overflow-hidden">

      <!-- UI Flex Wrapper for Floating Elements -->
      <div class="absolute inset-0 pointer-events-none p-4 md:p-6 z-[1000] flex items-start gap-4">

        <!-- Floating Panel -->
        <aside
          class="w-[340px] shrink-0 max-h-[calc(100vh-120px)] bg-white rounded-3xl shadow-2xl flex flex-col overflow-hidden pointer-events-auto transition-transform duration-300 transform -translate-x-[120%] md:translate-x-0 absolute md:relative left-4 md:left-0"
          id="sidebar">
          <div class="p-5 border-b border-gray-100 flex-none bg-white">
            <h1 class="text-xl font-bold text-gray-800 tracking-tight">Planner</h1>
            <p class="text-xs text-gray-400 mt-1">Generate routes from polygons.</p>
          </div>

          <div class="p-5 flex-grow overflow-y-auto flex flex-col gap-6 bg-white custom-scrollbar">

            <div id="creator-panel" class="flex flex-col gap-6 flex-grow">
              <!-- Mode Selection -->
              <div class="space-y-2">
                <label class="block text-xs font-bold text-gray-800 uppercase tracking-wide">Select a sport</label>
                <div class="grid grid-cols-2 gap-2">
                  <label class="cursor-pointer">
                    <input type="radio" name="mode" value="bike" class="peer sr-only" checked />
                    <div
                      class="rounded-xl border border-gray-200 bg-gray-50 px-3 py-2.5 text-center hover:bg-gray-100 peer-checked:border-[#4a6b46] peer-checked:bg-[#f0ece1] peer-checked:text-[#4a6b46] transition-all shadow-sm">
                      <span class="block text-sm font-bold">Pedal</span>
                    </div>
                  </label>
                  <label class="cursor-pointer">
                    <input type="radio" name="mode" value="walk" class="peer sr-only" />
                    <div
                      class="rounded-xl border border-gray-200 bg-gray-50 px-3 py-2.5 text-center hover:bg-gray-100 peer-checked:border-[#4a6b46] peer-checked:bg-[#f0ece1] peer-checked:text-[#4a6b46] transition-all shadow-sm">
                      <span class="block text-sm font-bold">Caminhada</span>
                    </div>
                  </label>
                </div>
              </div>

              <!-- Speed Settings -->
              <div class="space-y-2">
                <div class="flex justify-between items-center">
                  <label class="block text-xs font-bold text-gray-800 uppercase tracking-wide"
                    id="speed-label">Velocidade (km/h)</label>
                </div>
                <div class="relative">
                  <input type="number" id="speed-input" value="20" min="1" max="100"
                    class="block w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-2.5 font-medium text-gray-700 focus:border-[#4a6b46] focus:ring-[#4a6b46] focus:outline-none focus:ring-1 focus:bg-white transition-all" />
                </div>
              </div>

              <!-- Actions -->
              <div class="pt-2 mt-auto">
                <button id="generate-btn"
                  class="w-full bg-[#4a6b46] hover:bg-[#395336] text-white font-bold py-3 px-4 rounded-full shadow-lg hover:shadow-xl transition-all transform active:scale-[0.98] flex justify-center items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12h14" />
                    <path d="m12 5 7 7-7 7" />
                  </svg>
                  Gerar Rota
                </button>

              </div>
            </div>

            <!-- Results (Hidden initially) -->
            <div id="results-panel" class="hidden flex-col gap-3 pt-4 border-t border-gray-100">
              <div class="bg-[#f4f1ea] rounded-xl p-3 border border-[#e5e0d4] flex items-center justify-between">
                <div class="text-[10px] text-[#4a6b46] uppercase tracking-wider font-extrabold mb-0.5">Distância</div>
                <div class="text-xl font-extrabold text-gray-900" id="result-distance">-- km</div>
              </div>
              <div class="mt-2 bg-[#f4f1ea] rounded-xl p-3 border border-[#e5e0d4] flex items-center justify-between">
                <div class="text-[10px] text-[#4a6b46] uppercase tracking-wider font-extrabold mb-0.5">Tempo</div>
                <div class="text-xl font-extrabold text-gray-900" id="result-time">--:--</div>
              </div>

              <button id="preview-btn"
                class="w-full mt-2 bg-[#f0ece1] hover:bg-[#e6dfcf] text-[#4a6b46] font-bold py-2.5 px-4 rounded-full shadow-sm transition-colors flex justify-center items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z">
                  </path>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                Animar Rota
              </button>
              <div class="grid grid-cols-2 gap-2 mt-3">
                <button id="export-gpx-btn"
                  class="w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-2 px-3 rounded-full shadow transition-colors flex justify-center items-center gap-2 text-sm">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <polyline points="7 10 12 15 17 10" />
                    <line x1="12" x2="12" y1="15" y2="3" />
                  </svg>
                  GPX
                </button>
                <button id="share-btn"
                  class="w-full bg-[#4a6b46] hover:bg-[#395336] text-white font-bold py-2 px-3 rounded-full shadow transition-colors flex justify-center items-center gap-2 text-sm">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="18" cy="5" r="3" />
                    <circle cx="6" cy="12" r="3" />
                    <circle cx="18" cy="19" r="3" />
                    <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
                    <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
                  </svg>
                  Share
                </button>
              </div>

              <div id="shared-notice"
                class="hidden mt-2 bg-[#f0ece1] border border-[#e5e0d4] text-[#4a6b46] rounded-xl p-3 text-sm">
                <div class="font-extrabold flex items-center gap-2 mb-1">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                    <path d="m9 12 2 2 4-4" />
                  </svg>
                  Rota Compartilhada
                </div>
                <p class="font-medium text-gray-700">Visualizando rota externa. <a href="/"
                    class="text-[#4a6b46] hover:underline font-bold">Voltar ao início</a>.</p>
              </div>
            </div>

          </div>
        </aside>

        <!-- Draw Controls Container (Next to Sidebar) -->
        <div id="draw-tools-container" class="pointer-events-auto flex items-start gap-3"></div>

      </div>

      <!-- Map element -->
      <div class="absolute inset-0 z-0 pointer-events-auto" id="map-container"></div>

      <!-- Mobile toggle button -->
      <button id="sidebar-toggle"
        class="md:hidden absolute bottom-6 right-6 z-[1001] bg-[#4a6b46] text-white p-4 rounded-full shadow-2xl transition-transform active:scale-95">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 6h16M4 12h16M4 18h7" />
        </svg>
      </button>

    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
  <style>
    /* Custom Scrollbar for the floating panel */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background-color: #d1d5db;
      border-radius: 10px;
    }
  </style>
</body>

</html>

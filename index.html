<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#f8f7f5" />
  <title>Rotas - Explore Every Inch</title>
  <meta name="description"
    content="Draw an area on the map and get an optimized GPX track to walk or ride through every single street inside it." />
</head>

<body class="bg-gray-50 text-gray-900 font-sans antialiased overflow-hidden">
  <div id="app" class="flex flex-col h-screen w-screen">

    <!-- Top Navigation -->
    <nav
      class="h-16 bg-[#f4f1ea] border-b border-[#e5e0d4] flex items-center justify-between px-6 z-[1000] shrink-0 shadow-sm relative">
      <div class="flex items-center gap-6">
        <div class="flex items-center gap-2">
          <img src="/logo.svg" alt="Rotas Logo" class="h-8 w-auto drop-shadow-sm" />
          <span class="hidden md:block text-2xl font-extrabold text-gray-800 tracking-tight">Rotas</span>
        </div>
        <div class="hidden md:flex gap-5 text-sm font-bold text-gray-700 mt-1">
          <!-- <a href="#" class="hover:text-[#4a6b46] transition-colors">Routes</a> -->
          <a href="#" class="hover:text-[#4a6b46] transition-colors">Planner</a>
          <!-- <a href="#" class="hover:text-[#4a6b46] transition-colors">Features</a> -->
        </div>
      </div>
      <div class="flex items-center gap-3">
        <!-- Mobile Sport Dropdown -->
        <div id="mobile-sport-dropdown"
          class="relative md:hidden bg-[#f0ece1] rounded-full flex items-center h-9 pl-3 pr-2 cursor-pointer group transition-opacity duration-300">
          <select id="sport-select-mobile"
            class="appearance-none bg-transparent text-xs font-extrabold text-[#4a6b46] h-full pr-5 cursor-pointer outline-none">
            <option value="bike">Cycling</option>
            <option value="walk">Walking</option>
          </select>
          <svg class="w-3.5 h-3.5 text-[#4a6b46] absolute right-2.5 pointer-events-none"
            xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="m6 9 6 6 6-6" />
          </svg>
        </div>

        <!-- Mobile Generate Button -->
        <button id="mobile-generate-btn"
          class="md:hidden bg-[#4a6b46] text-white font-bold px-4 py-2 rounded-full text-sm transition-transform active:scale-95 disabled:opacity-50 flex items-center gap-2 shadow-sm">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14" />
            <path d="m12 5 7 7-7 7" />
          </svg>
          Plan Route
        </button>
        <!-- <button
          class="bg-[#f0ece1] text-[#4a6b46] font-bold px-4 py-2 rounded-full text-sm hover:bg-[#e5decb] transition-colors flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
            <line x1="12" y1="18" x2="12.01" y2="18"></line>
          </svg>
          App
        </button>
        <button
          class="bg-[#4a6b46] hover:bg-[#395336] text-white font-bold px-5 py-2 rounded-full text-sm transition-colors shadow-sm">
          Login or Signup
        </button> -->
      </div>
    </nav>

    <!-- Main Map Area -->
    <div class="flex-1 relative w-full h-full bg-gray-200 overflow-hidden">

      <!-- Map element -->
      <div class="absolute inset-0 z-0 pointer-events-auto" id="map-container"></div>

      <!-- UI Flex Wrapper for Floating Elements -->
      <div class="absolute inset-0 pointer-events-none p-4 md:p-6 z-[1000] flex items-start gap-4">

        <!-- Floating Panel -->
        <aside id="sidebar"
          class="hidden fixed bottom-6 inset-x-4 md:inset-auto md:relative md:w-80 bg-white shadow-2xl md:shadow-xl flex flex-col pointer-events-auto h-auto max-h-[50vh] md:max-h-none md:h-full rounded-3xl overflow-hidden z-[1002] md:z-50">

          <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto md:hidden shrink-0 mt-4 mb-1"></div>

          <!-- Header - always visible, both in creator and shared view -->
          <div class="hidden md:block p-5 bg-white border-b border-gray-100 shrink-0">
            <h1 class="text-xl font-bold text-gray-800 tracking-tight">Explore Every Inch</h1>
            <p class="text-xs text-gray-400 mt-1">Draw an area on the map and get an optimized GPX track to walk or ride
              through every single street inside it.</p>
          </div>

          <div id="creator-panel">
          </div>

          <div
            class="p-4 md:p-5 flex-grow overflow-y-auto flex flex-col gap-4 md:gap-6 bg-white md:bg-[#f8f7f5] custom-scrollbar">

            <!-- Results (Hidden initially) -->
            <div id="results-panel" class="hidden flex-col gap-4 md:pt-4 md:border-t border-gray-100 flex-grow">
              <h2 id="neighborhood-title" class="hidden flex justify-center items-center gap-2 mt-2 mb-1">
                <span id="neighborhood-name" class="text-xl font-extrabold text-gray-900"></span>
                <span id="sport-tag"
                  class="hidden bg-[#4a6b46] text-white text-[10px] px-2 py-1 rounded-md uppercase tracking-wider font-extrabold"></span>
              </h2>
              <div class="flex justify-around items-center pt-2 pb-1">
                <div class="flex flex-col items-center text-center">
                  <div class="text-2xl font-extrabold text-gray-900" id="result-distance">-- km</div>
                  <div class="text-[12px] text-gray-500 font-medium mt-1">Distance</div>
                </div>

                <div class="flex flex-col items-center text-center">
                  <div class="text-2xl font-extrabold text-gray-900" id="result-time">--:--</div>
                  <div class="text-[12px] text-gray-500 font-medium mt-1">Est. time</div>
                </div>
              </div>
            </div>

          </div>

          <!-- Actions footer — always pinned to bottom of sidebar -->
          <div id="actions-footer" class="hidden shrink-0 flex flex-col gap-3 p-4 md:p-5 bg-white md:bg-[#f8f7f5] border-t border-gray-100">
            <div class="grid grid-cols-2 gap-2">
              <button id="preview-btn"
                class="col-span-2 bg-[#f0ece1] hover:bg-[#e6dfcf] text-[#4a6b46] font-bold py-2.5 px-4 rounded-full shadow-sm transition-colors flex justify-center items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z">
                  </path>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                Preview
              </button>
              <button id="export-gpx-btn"
                class="col-span-1 bg-gray-800 hover:bg-gray-900 text-white font-bold py-2 px-3 rounded-full shadow transition-colors flex justify-center items-center gap-2 text-sm">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                  <polyline points="7 10 12 15 17 10" />
                  <line x1="12" x2="12" y1="15" y2="3" />
                </svg>
                GPX
              </button>
              <button id="share-btn"
                class="col-span-1 bg-[#4a6b46] hover:bg-[#395336] text-white font-bold py-2 px-3 rounded-full shadow transition-colors flex justify-center items-center gap-2 text-sm">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="18" cy="5" r="3" />
                  <circle cx="6" cy="12" r="3" />
                  <circle cx="18" cy="19" r="3" />
                  <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
                  <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
                </svg>
                Share
              </button>
            </div>

            <div id="shared-notice" class="hidden">
              <p class="text-sm font-medium text-gray-700">Viewing an external route. <a href="/"
                  class="text-[#4a6b46] hover:underline font-bold">Start over</a>.</p>
            </div>
          </div>

        </aside>

        <!-- Top Toolbar (Draw + Selectors + Generate) -->
        <div class="flex-1 flex justify-between items-start pointer-events-none">
          <!-- Left Side: Tools + Dropdown -->
          <div id="desktop-tools"
            class="flex flex-col md:flex-row items-start gap-3 pointer-events-auto transition-all">
            <!-- Draw Controls Container -->
            <div id="draw-tools-container" class="flex items-start gap-3"></div>

            <!-- Sport Dropdown -->
            <div
              class="hidden relative bg-white rounded-full shadow-lg border border-gray-200 md:flex items-center h-11 pl-4 pr-3 hover:bg-gray-50 transition-colors cursor-pointer group">
              <select id="sport-select"
                class="appearance-none bg-transparent text-sm font-extrabold text-gray-800 h-full pr-6 cursor-pointer outline-none">
                <option value="bike">Cycling</option>
                <option value="walk">Walking</option>
              </select>
              <svg class="w-4 h-4 text-gray-500 absolute right-3 pointer-events-none" xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="m6 9 6 6 6-6" />
              </svg>
            </div>
          </div>

          <!-- Right Side: Generate Button -->
          <div id="desktop-generate-wrapper" class="pointer-events-auto ml-auto hidden md:block">
            <button id="generate-btn"
              class="bg-[#4a6b46] hover:bg-[#395336] text-white font-bold py-2.5 px-5 rounded-full shadow-lg hover:shadow-xl transition-all transform active:scale-[0.98] flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed h-11">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14" />
                <path d="m12 5 7 7-7 7" />
              </svg>
              Plan Route
            </button>
          </div>
        </div>

      </div>

    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
  <style>
    /* Custom Scrollbar for the floating panel */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background-color: #d1d5db;
      border-radius: 10px;
    }
  </style>
</body>

</html>

<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Otimizador de Quadrantes GPS</title>
  </head>
  <body class="bg-gray-50 text-gray-900 font-sans antialiased overflow-hidden">
    <div id="app" class="flex h-screen w-screen">
      <!-- Sidebar -->
      <aside class="w-80 bg-white shadow-xl z-20 flex flex-col h-full absolute md:relative transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out" id="sidebar">
        <div class="p-6 border-b border-gray-100 flex-none">
          <h1 class="text-xl font-bold text-gray-800 tracking-tight">Otimizador de<br/><span class="text-primary">Quadrantes GPS</span></h1>
          <p class="text-sm text-gray-500 mt-2">Gere rotas passando por todas as ruas do polígono selecionado.</p>
        </div>

        <div class="p-6 flex-grow overflow-y-auto flex flex-col gap-6">
          
          <!-- Mode Selection -->
          <div class="space-y-3">
            <label class="block text-sm font-medium text-gray-700">Modo de Transporte</label>
            <div class="grid grid-cols-2 gap-3">
              <label class="cursor-pointer">
                <input type="radio" name="mode" value="bike" class="peer sr-only" checked />
                <div class="rounded-lg border border-gray-200 bg-white px-4 py-3 text-center hover:bg-gray-50 peer-checked:border-primary peer-checked:bg-blue-50 peer-checked:text-primary transition-all">
                  <span class="block text-sm font-semibold">Pedal</span>
                </div>
              </label>
              <label class="cursor-pointer">
                <input type="radio" name="mode" value="walk" class="peer sr-only" />
                <div class="rounded-lg border border-gray-200 bg-white px-4 py-3 text-center hover:bg-gray-50 peer-checked:border-primary peer-checked:bg-blue-50 peer-checked:text-primary transition-all">
                  <span class="block text-sm font-semibold">Caminhada</span>
                </div>
              </label>
            </div>
          </div>

          <!-- Speed Settings -->
          <div class="space-y-3">
            <div class="flex justify-between items-center">
              <label class="block text-sm font-medium text-gray-700" id="speed-label">Velocidade (km/h)</label>
            </div>
            <div class="relative">
              <input type="number" id="speed-input" value="20" min="1" max="100" class="block w-full rounded-lg border border-gray-300 px-4 py-3 focus:border-primary focus:ring-primary focus:outline-none focus:ring-1 transition-shadow" />
            </div>
          </div>

          <!-- Actions -->
          <div class="pt-4 mt-auto">
            <button id="generate-btn" class="w-full bg-primary hover:bg-blue-600 text-white font-semibold py-3 px-4 rounded-lg shadow-md hover:shadow-lg transition-all transform active:scale-95 flex justify-center items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
              Gerar Rota Otimizada
            </button>
          </div>
          
          <!-- Results (Hidden initially) -->
          <div id="results-panel" class="hidden flex-col gap-3 pt-4 border-t border-gray-100">
             <div class="bg-gray-50 rounded-lg p-4 border border-gray-200">
               <div class="text-xs text-gray-500 uppercase tracking-wider font-semibold mb-1">Distância Total</div>
               <div class="text-2xl font-bold text-gray-900" id="result-distance">-- km</div>
             </div>
             <div class="bg-gray-50 rounded-lg p-4 border border-gray-200">
               <div class="text-xs text-gray-500 uppercase tracking-wider font-semibold mb-1">Tempo Estimado</div>
               <div class="text-2xl font-bold text-gray-900" id="result-time">--:--</div>
             </div>
             
             <button id="preview-btn" class="w-full mt-2 bg-blue-100 hover:bg-blue-200 text-blue-700 font-medium py-2.5 px-4 rounded-lg shadow-sm transition-colors flex justify-center items-center gap-2">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
              Animar Rota
            </button>
            <button id="export-gpx-btn" class="w-full mt-2 bg-gray-800 hover:bg-gray-900 text-white font-medium py-2.5 px-4 rounded-lg shadow transition-colors flex justify-center items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                Exportar .gpx
             </button>
          </div>

        </div>
      </aside>

      <!-- Map Area -->
      <main class="flex-1 relative bg-gray-200 z-10" id="map-container">
        <!-- Leaflet will attach here -->
      </main>

      <!-- Mobile toggle button -->
      <button id="sidebar-toggle" class="md:hidden absolute bottom-6 right-6 z-30 bg-primary text-white p-4 rounded-full shadow-xl">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
      </button>

    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
